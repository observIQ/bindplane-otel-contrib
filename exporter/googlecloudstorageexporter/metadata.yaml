type: googlecloudstorage

status:
  codeowners:
    active: [observIQ/fleet, observIQ/pipeline, observIQ/platformteam, observIQ/ai]
  class: exporter
  stability:
    beta: [traces, metrics, logs]
  distributions: [Bindplane]

tests:
  skip_lifecycle: true
  skip_shutdown: true

attributes:
  bucket:
    description: The name of the GCS bucket.
    type: string
  encoding:
    description: The encoding applied to the payload (e.g. json, json/gzip).
    type: string
  error:
    description: The error classification for the request.
    type: string
    enum:
      - none
      - timeout
      - unknown
  location:
    description: The GCS bucket location.
    type: string

telemetry:
  metrics:
    exporter_payload_size:
      enabled: true
      description: The size of the marshaled and optionally compressed payload in bytes.
      stability: alpha
      unit: By
      histogram:
        value_type: int
        bucket_boundaries:
          [1e6, 2.5e6, 5e6, 7.5e6, 10e6, 25e6, 50e6, 75e6, 100e6, 250e6, 500e6, 750e6, 1e9]
      attributes:
        - encoding
        - bucket

    exporter_request_duration:
      enabled: true
      description: The duration of the GCS upload request in milliseconds.
      stability: alpha
      unit: ms
      histogram:
        value_type: int
        bucket_boundaries:
          [100, 250, 500, 750, 1000, 2000, 3000, 5000, 7500, 10000, 15000, 20000, 30000, 45000, 60000, 90000, 120000]
      attributes:
        - error
        - bucket
        - location

    exporter_timeout_total:
      enabled: true
      description: The number of upload requests that resulted in a timeout.
      stability: alpha
      unit: "{requests}"
      sum:
        monotonic: true
        value_type: int
      attributes:
        - bucket

    exporter_upload_bytes_total:
      enabled: true
      description: The cumulative number of bytes uploaded to GCS.
      stability: alpha
      unit: By
      sum:
        monotonic: true
        value_type: int
      attributes:
        - bucket

    exporter_upload_inflight:
      enabled: true
      description: The number of uploads currently in flight.
      stability: alpha
      unit: "{uploads}"
      sum:
        value_type: int
      attributes:
        - bucket
