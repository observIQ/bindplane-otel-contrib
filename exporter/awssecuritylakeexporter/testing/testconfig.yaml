receivers:
  telemetrygeneratorreceiver:
    payloads_per_second: 1
    generators:
      - type: logs
        resource_attributes:
          source: "test-generator"
        attributes:
          log.type: "security"
        additional_config:
          body: '{"user": "admin", "action": "login", "src_ip": "192.168.1.100", "status": "success"}'
          severity: 9

processors:
  transform:
    log_statements:
      - context: log
        statements:
          - merge_maps(cache, ParseJSON(body.string), "upsert")
          - set(body, cache)

  ocsf_standardization:
    ocsf_version: "1.3.0"
    event_mappings:
      - class_id: 3001
        filter: 'attributes["log.type"] == "security"'
        field_mappings:
          - default: "Bindplane Agent"
            to: "source.name"
          - to: "activity_id"
            default: 2
          - to: "category_uid"
            default: 2
          - to: "severity_id"
            default: 3
          - to: "time"
            default: 4587928389
          - to: "type_uid"
            default: 1
          - to: "user.name"
            default: "test"
          - to: "metadata.product.name"
            default: "bindplane"
          - to: "metadata.product.vendor_name"
            default: "observIQ"
          - from: 'body["user"]'
            to: "actor.user.name"
          - from: 'body["action"]'
            to: "activity_name"
          - from: 'body["src_ip"]'
            to: "src_endpoint.ip"
          - from: 'body["status"]'
            to: "status"

exporters:
  debug:
    verbosity: detailed

  aws_security_lake:
    source_name: "test-source"
    account_id: "123456789012"
    region: "us-east-1"
    s3_bucket: "bindplane-test-bucket"
    s3_prefix: "ext/"

service:
  telemetry:
    logs:
      level: debug
  pipelines:
    logs:
      receivers: [telemetrygeneratorreceiver]
      processors: [transform, ocsf_standardization]
      exporters: [debug, aws_security_lake]
