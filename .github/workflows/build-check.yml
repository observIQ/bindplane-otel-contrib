name: Build Check
on:
  pull_request:

permissions:
  contents: read

jobs:
  # Graphite CI optimization: skip redundant CI runs for stacked PRs.
  # See https://graphite.com/docs/stacking-and-ci
  optimize_ci:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@26bc0dcdeaba101794931d67a464ecbb21a76a8b # v0.0.9 tag (no formal releases)
        with:
          graphite_token: ${{ secrets.GRAPHITE_CI_OPTIMIZER_TOKEN }}

  build-collector:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]'
    needs:
      - optimize_ci
    runs-on: ubuntu-latest-8-cores
    strategy:
      matrix:
        target: [build-linux, build-darwin, build-windows]
    steps:
      - name: Checkout Contrib
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: contrib

      # OTel version bumps are coordinated breaking changes that must land in
      # contrib and collector in lockstep, so contrib cannot always build
      # against collector's main. For OTel-bump branches only (deps/otel-*),
      # if a collector branch exists with the same name, build against it;
      # otherwise use main.
      - name: Resolve collector ref
        id: collector_ref
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [ "${BRANCH#deps/otel-}" != "$BRANCH" ] && git ls-remote --exit-code --heads \
            https://github.com/observIQ/bindplane-otel-collector.git "$BRANCH" >/dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "::notice title=Build Check::Found matching collector branch '$BRANCH'; building contrib against it."
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "::notice title=Build Check::No matching collector branch; building contrib against collector 'main'."
          fi

      - name: Checkout Collector
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: observIQ/bindplane-otel-collector
          ref: ${{ steps.collector_ref.outputs.ref }}
          path: collector

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          # Match the Go version the collector builds with.
          go-version-file: "collector/internal/extension/opampconnectionextension/go.mod"
          cache: false

      - name: Set up Go cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build Collector with Contrib Modules
        run: make -C contrib ${{ matrix.target }} COLLECTOR_PATH=../collector

  build-summary:
    if: always()
    needs: [optimize_ci, build-collector]
    runs-on: ubuntu-latest
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.build-collector.result }}" == "success" ]]; then
            echo "All builds succeeded"
          elif [[ "${{ needs.build-collector.result }}" == "skipped" ]]; then
            echo "Build skipped"
          else
            echo "Builds failed"
            exit 1
          fi
