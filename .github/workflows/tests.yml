name: Tests
on:
  pull_request:

permissions:
  contents: read

jobs:
  # Graphite CI optimization: skip redundant CI runs for stacked PRs.
  # See https://graphite.com/docs/stacking-and-ci
  optimize_ci:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@26bc0dcdeaba101794931d67a464ecbb21a76a8b # v0.0.9 tag (no formal releases)
        with:
          graphite_token: ${{ secrets.GRAPHITE_CI_OPTIMIZER_TOKEN }}

  # Detect which files changed to skip irrelevant jobs on PRs.
  detect-changes:
    if: needs.optimize_ci.outputs.skip != 'true'
    needs:
      - optimize_ci
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # if this file changed, run all tests. if the makefile changed, run all tests.
      go: ${{ steps.filter.outputs.go == 'true' || steps.filter.outputs.tests == 'true' || steps.filter.outputs.makefile == 'true' }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Detect changed files
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          # These filters are based on picomatch syntax https://github.com/micromatch/picomatch#
          filters: |
            tests:
              - '.github/workflows/tests.yml'
            makefile:
              - 'Makefile'
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'

  unit-tests:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true'
    needs:
      - optimize_ci
      - detect-changes
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          # Ubuntu - All tests
          - os: ubuntu
            runner: ubuntu-latest-32-cores
            test_cmd: make test
          # macOS - All tests
          - os: macos
            runner: macos-15-xlarge
            test_cmd: make test
          # Windows - All tests
          - os: windows
            runner: windows-2022-16-cores
            test_cmd: make test
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout Sources (Unix)
        if: matrix.os != 'windows'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Checkout Sources (Windows)
        if: matrix.os == 'windows'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "internal/tools/go.mod"
          cache: false

      - name: Cache Go build (Ubuntu)
        if: matrix.os == 'ubuntu'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Cache Go build (macOS)
        if: matrix.os == 'macos'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /Users/runner/Library/Caches/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Cache Go modules (Ubuntu)
        if: matrix.os == 'ubuntu'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go modules (macOS)
        if: matrix.os == 'macos'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /Users/runner/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go modules (Windows)
        if: matrix.os == 'windows'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: C:\Users\runneradmin\go\pkg\mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go build cache (Windows)
        if: matrix.os == 'windows'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: C:\Users\runneradmin\AppData\Local\go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Cache Tools (Ubuntu)
        if: matrix.os == 'ubuntu'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('internal/tools/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Cache Tools (macOS)
        if: matrix.os == 'macos'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /Users/runner/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('internal/tools/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Cache Tools (Windows)
        if: matrix.os == 'windows'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: C:\Users\runneradmin\go\bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('internal/tools/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Install Tools
        run: make install-tools-ci

      - name: Run Tests
        run: ${{ matrix.test_cmd }}

  test-summary:
    if: always()
    needs: [optimize_ci, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.unit-tests.result }}" == "success" ]]; then
            echo "All tests passed"
          elif [[ "${{ needs.unit-tests.result }}" == "skipped" ]]; then
            echo "Tests skipped"
          else
            echo "Tests failed"
            exit 1
          fi
