name: pr_checks
on:
  pull_request:

permissions:
  contents: read

jobs:
  # Graphite CI optimization: skip redundant CI runs for stacked PRs.
  # See https://graphite.com/docs/stacking-and-ci
  optimize_ci:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@26bc0dcdeaba101794931d67a464ecbb21a76a8b # v0.0.9 tag (no formal releases)
        with:
          graphite_token: ${{ secrets.GRAPHITE_CI_OPTIMIZER_TOKEN }}

  # Detect which files changed to skip irrelevant jobs on PRs.
  detect-changes:
    if: needs.optimize_ci.outputs.skip != 'true'
    needs:
      - optimize_ci
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # if this file changed, run all checks. if the makefile changed, run all checks.
      go: ${{ steps.filter.outputs.go == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true'  }}
      scripts: ${{ steps.filter.outputs.scripts == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      misspell: ${{ steps.filter.outputs.misspell == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      gomod: ${{ steps.filter.outputs.gomod == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      dependabot: ${{ steps.filter.outputs.dependabot == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@c79c9a72c5df9e9590f9de7718b2f232c3e75879 # v7
      - name: Detect changed files
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          # These filters are based on picomatch syntax https://github.com/micromatch/picomatch#
          filters: |
            checks:
              - '.github/workflows/checks.yml'
            makefile:
              - 'Makefile'
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
            scripts:
              - '**/*.sh'
            misspell:
              - '**/*.md'
              - '**/*.yaml'
            gomod:
              - '**/go.mod'
            dependabot:
              - '.github/dependabot.yml'

  setup-tools:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]'
    needs:
      - optimize_ci
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@c79c9a72c5df9e9590f9de7718b2f232c3e75879 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.7"
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools

  check-fmt:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true'
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@c79c9a72c5df9e9590f9de7718b2f232c3e75879 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.7"
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Check Formatting
        run: make check-fmt

  check-license:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && (needs.detect-changes.outputs.go == 'true' || needs.detect-changes.outputs.scripts == 'true')
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@c79c9a72c5df9e9590f9de7718b2f232c3e75879 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.7"
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Check License Headers
        run: make check-license

  gosec:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true'
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Source
        uses: namespacelabs/nscloud-checkout-action@c79c9a72c5df9e9590f9de7718b2f232c3e75879 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.7"
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Run Gosec Security Scanner
        run: make gosec

  misspell:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.misspell == 'true'
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@c79c9a72c5df9e9590f9de7718b2f232c3e75879 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.7"
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Check for Misspelled Words in Doc Files
        run: make misspell

  lint:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true'
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@c79c9a72c5df9e9590f9de7718b2f232c3e75879 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.7"
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Run Revive Linter
        run: make lint

  # Below checks don't need to run `make install-tools`
  check-mod-paths:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.gomod == 'true'
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@c79c9a72c5df9e9590f9de7718b2f232c3e75879 # v7
      - name: Check Module Paths
        run: make check-mod-paths

  check-dependabot:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && (needs.detect-changes.outputs.dependabot == 'true' || needs.detect-changes.outputs.gomod == 'true')
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@c79c9a72c5df9e9590f9de7718b2f232c3e75879 # v7
      - name: Check Dependabot
        run: make check-dependabot
