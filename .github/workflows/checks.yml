name: pr_checks
on:
  pull_request:

permissions:
  contents: read

jobs:
  # Graphite CI optimization: skip redundant CI runs for stacked PRs.
  # See https://graphite.com/docs/stacking-and-ci
  optimize_ci:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@26bc0dcdeaba101794931d67a464ecbb21a76a8b # v0.0.9 tag (no formal releases)
        with:
          graphite_token: ${{ secrets.GRAPHITE_CI_OPTIMIZER_TOKEN }}

  # Detect which files changed to skip irrelevant jobs on PRs.
  detect-changes:
    if: needs.optimize_ci.outputs.skip != 'true'
    needs:
      - optimize_ci
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # if this file changed, run all checks. if the makefile changed, run all checks.
      go: ${{ steps.filter.outputs.go == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true'  }}
      generate: ${{ steps.filter.outputs.generate == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      scripts: ${{ steps.filter.outputs.scripts == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      misspell: ${{ steps.filter.outputs.misspell == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      gomod: ${{ steps.filter.outputs.gomod == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      dependabot: ${{ steps.filter.outputs.dependabot == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Detect changed files
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          # These filters are based on picomatch syntax https://github.com/micromatch/picomatch#
          filters: |
            checks:
              - '.github/workflows/checks.yml'
            makefile:
              - 'Makefile'
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
            generate:
              - '**/*.go'
              - '**/metadata.yaml'
            scripts:
              - '**/*.sh'
            misspell:
              - '**/*.md'
              - '**/*.yaml'
            gomod:
              - '**/go.mod'
            dependabot:
              - '.github/dependabot.yml'

  setup-tools:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]'
    needs:
      - optimize_ci
    runs-on: ubuntu-latest-8-cores
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "internal/tools/go.mod"
          cache: false # Use the dedicated actions/cache step instead
      - name: Set up Go cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Cache Tools
        id: tool-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/go/bin
          key: ${{ runner.os }}-gotools-${{ hashFiles('**/go.sum', '**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-gotools-
      - name: Install Tools
        run: make install-tools

  check-fmt:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest-8-cores
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "internal/tools/go.mod"
          cache: false # Use the dedicated actions/cache step instead
      - name: Set up Go cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Cache Tools
        id: tool-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/go/bin
          key: ${{ runner.os }}-gotools-${{ hashFiles('**/go.sum', '**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-gotools-
      - name: Install Tools
        run: make install-tools
      - name: Check Formatting
        run: make check-fmt

  check-license:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && (needs.detect-changes.outputs.go == 'true' || needs.detect-changes.outputs.scripts == 'true')
    runs-on: ubuntu-latest-8-cores
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "internal/tools/go.mod"
          cache: false # Use the dedicated actions/cache step instead
      - name: Set up Go cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Cache Tools
        id: tool-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/go/bin
          key: ${{ runner.os }}-gotools-${{ hashFiles('**/go.sum', '**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-gotools-
      - name: Install Tools
        run: make install-tools
      - name: Check License Headers
        run: make check-license

  gosec:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest-8-cores
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "internal/tools/go.mod"
          cache: false # Use the dedicated actions/cache step instead
      - name: Set up Go cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Cache Tools
        id: tool-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/go/bin
          key: ${{ runner.os }}-gotools-${{ hashFiles('**/go.sum', '**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-gotools-
      - name: Install Tools
        run: make install-tools
      - name: Run Gosec Security Scanner
        run: make gosec

  misspell:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.misspell == 'true'
    runs-on: ubuntu-latest-8-cores
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "internal/tools/go.mod"
          cache: false # Use the dedicated actions/cache step instead
      - name: Set up Go cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Cache Tools
        id: tool-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/go/bin
          key: ${{ runner.os }}-gotools-${{ hashFiles('**/go.sum', '**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-gotools-
      - name: Install Tools
        run: make install-tools
      - name: Check for Misspelled Words in Doc Files
        run: make misspell

  lint:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest-8-cores
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "internal/tools/go.mod"
          cache: false # Use the dedicated actions/cache step instead
      - name: Set up Go cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Cache Tools
        id: tool-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/go/bin
          key: ${{ runner.os }}-gotools-${{ hashFiles('**/go.sum', '**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-gotools-
      - name: Install Tools
        run: make install-tools
      - name: Run Revive Linter
        run: make lint

  check-generate:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.generate == 'true'
    runs-on: ubuntu-latest-8-cores
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "internal/tools/go.mod"
          cache: false # Use the dedicated actions/cache step instead
      - name: Set up Go cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Cache Tools
        id: tool-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: /home/runner/go/bin
          key: ${{ runner.os }}-gotools-${{ hashFiles('**/go.sum', '**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-gotools-
      - name: Install Tools
        run: make install-tools
      - name: Run Code Generation
        run: make generate
      - name: Check for Uncommitted Changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is out of date. Run 'make generate' and commit the result."
            exit 1
          fi

  # Below checks don't need to run `make install-tools`
  check-mod-paths:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.gomod == 'true'
    runs-on: ubuntu-latest-8-cores
    needs:
      - optimize_ci
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check Module Paths
        run: make check-mod-paths

  check-dependabot:
    if: needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && (needs.detect-changes.outputs.dependabot == 'true' || needs.detect-changes.outputs.gomod == 'true')
    runs-on: ubuntu-latest-8-cores
    needs:
      - optimize_ci
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check Dependabot
        run: make check-dependabot
