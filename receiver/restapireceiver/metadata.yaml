type: restapi

status:
  distributions: [Bindplane]
  codeowners:
    active: [observIQ/fleet, observIQ/pipeline, observIQ/platformteam, observIQ/ai]
  class: receiver
  stability:
    beta: [logs, metrics]

tests:
  config:
    url: "https://api.example.com/data"
    auth_mode: "apikey"
    apikey:
      header_name: "X-API-Key"
      value: "test-key"
    metrics:
      name_field: "name"

